<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>GitHub Raw Previewer</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <img src="icons/icon48.png" alt="icon">
        <div class="title-area">
            <h2>Raw Previewer</h2>
            <span class="version">v2026.3.4</span>
        </div>
    </div>
    <p class="subtitle">Toggle formats to preview inline. Disabled ones will trigger standard downloads.</p>

    <div id="categories-container">
        <!-- Rendered by popup.js -->
    </div>

    <div class="footer">
        <a href="https://github.com/Hilalum/github-raw-previewer" target="_blank">Star on GitHub ⭐</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
